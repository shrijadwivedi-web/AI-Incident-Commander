# A generic, single-database configuration.

[alembic]
# Path to migration scripts
script_location = migrations

# Location of version files
version_locations = %(here)s/migrations/versions

# Database URL — overridden at runtime by env.py via the DATABASE_URL
# environment variable.  This placeholder prevents Alembic from erroring
# when it reads the ini file before env.py runs.
sqlalchemy.url = postgresql://incident_commander:incident_commander@localhost:5432/incident_commander

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path pathprefix to prepend to sys.path prior to instantiating the migration environment
prepend_sys_path = .

# timezone to use when rendering the date within the migration file as well as the filename.
# string value is passed to dateutil.tz.gettz()
# timezone = UTC

# max length of characters to use for the "slug" field
# truncate_slug_length = 40

# set to 'true' to run the environment during the
# 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow systems to find next available version number
# version_path_separator = os

[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are run
# on newly generated migration scripts. See the documentation for details.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
